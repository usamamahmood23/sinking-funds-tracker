<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAFAF9" />
  <meta name="description" content="Offline-first savings goal tracker. Plan ahead. Save in peace." />
  <title>Sinking Funds</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />
  <link rel="shortcut icon" href="icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

  <style>
    /* ==========================================================
       DESIGN TOKENS — Light first, dark as opt-in
       ========================================================== */
    :root {
      --bg: #FAFAF9;
      --surface: #FFFFFF;
      --surface-subtle: #F5F5F4;
      --border: #E7E5E4;
      --border-strong: #D6D3D1;
      --accent: #0F766E;
      --accent-hover: #0D5F58;
      --accent-subtle: #F0FDFA;
      --text-primary: #1C1917;
      --text-secondary: #57534E;
      --text-muted: #A8A29E;
      --success: #15803D;
      --success-subtle: #F0FDF4;
      --warning: #B45309;
      --warning-subtle: #FFFBEB;
      --danger: #B91C1C;
      --danger-subtle: #FEF2F2;
      --overlay: rgba(0, 0, 0, 0.4);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.10);
      --radius-card: 12px;
      --radius-input: 10px;
      --radius-pill: 999px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --header-h: 64px;
      --navbar-h: 72px;
      --easing: cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --bg: #0C0A09;
      --surface: #1C1917;
      --surface-subtle: #292524;
      --border: #292524;
      --border-strong: #44403C;
      --accent: #14B8A6;
      --accent-hover: #2DD4BF;
      --accent-subtle: rgba(20, 184, 166, 0.10);
      --text-primary: #FAFAF9;
      --text-secondary: #A8A29E;
      --text-muted: #78716C;
      --success: #4ADE80;
      --success-subtle: rgba(74, 222, 128, 0.10);
      --warning: #FBBF24;
      --warning-subtle: rgba(251, 191, 36, 0.10);
      --danger: #F87171;
      --danger-subtle: rgba(248, 113, 113, 0.10);
      --overlay: rgba(0, 0, 0, 0.6);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.6);
    }

    /* ==========================================================
       BASE
       ========================================================== */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      font-size: 14px;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      line-height: 1.5;
      transition: background 200ms ease, color 200ms ease;
      overscroll-behavior-y: none;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
    input, select, textarea { font-family: inherit; color: inherit; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.01em; line-height: 1.25; }
    p { margin: 0; }

    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    .tabular { font-variant-numeric: tabular-nums; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .hidden { display: none !important; }

    /* ==========================================================
       APP SHELL
       ========================================================== */
    .app-shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: calc(var(--navbar-h) + env(safe-area-inset-bottom, 0px));
    }

    /* ----- Header ----- */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      padding-top: env(safe-area-inset-top, 0px);
    }
    .brand {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      flex: 1;
    }
    .header-actions { display: inline-flex; align-items: center; gap: 4px; }
    .demo-pill {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }
    .demo-pill:hover { background: var(--surface-subtle); color: var(--text-primary); border-color: var(--border-strong); }
    .install-pill {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      padding: 7px 12px;
      background: var(--accent-subtle);
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 180ms ease;
    }
    .install-pill:hover { filter: brightness(0.96); }
    .install-pill svg { width: 14px; height: 14px; }
    .icon-btn {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: var(--text-secondary);
      transition: background 180ms ease, color 180ms ease;
    }
    .icon-btn:hover { background: var(--surface-subtle); color: var(--text-primary); }
    .icon-btn svg { width: 18px; height: 18px; stroke-width: 1.75; }

    /* ----- Main ----- */
    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .view { display: none; }
    .view.active { display: block; animation: fade-in 200ms ease; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: none; }
    }

    /* ----- Navigation: bottom bar (mobile) ----- */
    .sidebar-brand { display: none; }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: 4px;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      gap: 3px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      border-radius: 8px;
      transition: color 180ms ease;
    }
    .nav-item svg { width: 22px; height: 22px; stroke-width: 1.75; }
    .nav-item.active { color: var(--accent); }
    .nav-fab {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(15, 118, 110, 0.30);
      transition: background 180ms ease, transform 180ms ease;
      flex-shrink: 0;
      margin-top: -16px;
    }
    [data-theme="dark"] .nav-fab { color: #0C0A09; }
    .nav-fab:hover { background: var(--accent-hover); }
    .nav-fab svg { width: 22px; height: 22px; stroke-width: 2; }

    /* ----- Desktop: sidebar ----- */
    @media (min-width: 1024px) {
      .app-shell { flex-direction: row; padding-bottom: 0; }
      .app-header { display: none; }
      .nav-bar {
        position: sticky;
        top: 0;
        bottom: auto;
        height: 100vh;
        width: 240px;
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
        gap: 2px;
        padding: 24px 16px;
        border-top: none;
        border-right: 1px solid var(--border);
        background: var(--bg);
        flex-shrink: 0;
      }
      .sidebar-brand {
        display: block;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text-primary);
        padding: 4px 12px 28px;
      }
      .nav-item {
        flex: none;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        padding: 10px 14px;
        font-size: 14px;
        border-radius: 8px;
      }
      .nav-item:hover { background: var(--surface-subtle); color: var(--text-secondary); }
      .nav-item.active { background: var(--accent-subtle); color: var(--accent); }
      .nav-item.active:hover { background: var(--accent-subtle); color: var(--accent); }
      .nav-fab {
        margin-top: 16px;
        align-self: stretch;
        height: 44px;
        width: auto;
        border-radius: var(--radius-input);
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
      }
      .nav-fab::after { content: 'New fund'; }
      .app-content-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .desktop-header {
        position: sticky;
        top: 0;
        z-index: 30;
        background: color-mix(in srgb, var(--bg) 86%, transparent);
        backdrop-filter: saturate(140%) blur(12px);
        -webkit-backdrop-filter: saturate(140%) blur(12px);
        height: var(--header-h);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 32px;
        border-bottom: 1px solid var(--border);
      }
      .desktop-header .brand { font-size: 0; }
      main { padding: 32px; }
    }
    .desktop-header { display: none; }
    @media (min-width: 1024px) { .desktop-header { display: flex; } }

    /* ==========================================================
       BUTTONS
       ========================================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: var(--radius-input);
      font-weight: 500;
      font-size: 14px;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease, transform 120ms ease;
      white-space: nowrap;
      border: 1px solid transparent;
      line-height: 1;
      min-height: 40px;
    }
    .btn:active { transform: scale(0.98); }
    .btn svg { width: 16px; height: 16px; stroke-width: 1.75; }
    .btn-primary {
      background: linear-gradient(180deg, var(--accent) 0%, #115E59 100%);
      color: white;
      font-weight: 500;
    }
    [data-theme="dark"] .btn-primary { background: var(--accent); color: #0C0A09; font-weight: 600; }
    .btn-primary:hover { filter: brightness(1.04); }
    [data-theme="dark"] .btn-primary:hover { background: var(--accent-hover); filter: none; }
    .btn-secondary {
      background: var(--surface);
      color: var(--text-primary);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--surface-subtle); border-color: var(--border-strong); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--surface-subtle); color: var(--text-primary); }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-danger:hover { filter: brightness(1.06); }
    .btn-block { width: 100%; }

    /* ==========================================================
       CARDS
       ========================================================== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
    }

    /* ==========================================================
       HOME: HERO + ACTIONS
       ========================================================== */
    .hero {
      padding: 24px;
      margin-bottom: 24px;
    }
    @media (min-width: 1024px) { .hero { padding: 32px; } }
    .hero-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .hero-amount {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 600;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      margin: 6px 0 4px;
      line-height: 1.05;
    }
    .hero-subline { color: var(--text-secondary); font-size: 14px; }
    .hero-mixed-note { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .hero-progress { margin: 20px 0 16px; }
    .hero-stats {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .hero-stats .sep { color: var(--text-muted); }
    .hero-stats .v { color: var(--text-primary); font-weight: 500; }

    .progress {
      height: 6px;
      background: var(--surface-subtle);
      border-radius: 999px;
      overflow: hidden;
    }
    [data-theme="dark"] .progress { background: #292524; }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 300ms ease-out;
    }
    .progress-fill.warning { background: var(--warning); }
    .progress-fill.danger { background: var(--danger); }
    .progress-fill.success { background: var(--success); }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    @media (min-width: 1024px) { .action-row { justify-content: flex-end; } }
    .action-row .btn { flex: 1; min-width: 0; }
    @media (min-width: 640px) { .action-row .btn { flex: 0 0 auto; } }

    /* ==========================================================
       FILTER TABS (underline style)
       ========================================================== */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 12px 4px;
      margin-right: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      transition: color 180ms ease, border-color 180ms ease;
      white-space: nowrap;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ==========================================================
       SEARCH
       ========================================================== */
    .search-row {
      position: relative;
      margin-bottom: 20px;
    }
    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 12px 0 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      background: var(--surface);
      font-size: 14px;
      color: var(--text-primary);
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); outline: none; }
    .search-row svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      stroke-width: 1.75;
      pointer-events: none;
    }

    /* ==========================================================
       FUND CARDS GRID
       ========================================================== */
    .fund-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 640px) { .fund-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .fund-grid { grid-template-columns: repeat(3, 1fr); } }

    .fund-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
      width: 100%;
      transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }
    .fund-card:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .fund-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .fund-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .fund-icon svg { width: 20px; height: 20px; stroke-width: 1.75; }
    .fund-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .fund-status-dot.onTrack, .fund-status-dot.completed { background: var(--success); }
    .fund-status-dot.behind { background: var(--warning); }
    .fund-status-dot.overdue { background: var(--danger); }

    .fund-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .fund-category {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .fund-amounts {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .fund-saved {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .fund-target {
      font-size: 14px;
      color: var(--text-muted);
    }
    .fund-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-secondary);
      gap: 8px;
    }
    .fund-footer .needed { color: var(--text-primary); font-weight: 500; }

    /* ==========================================================
       EMPTY STATE
       ========================================================== */
    .empty {
      padding: 60px 20px;
      max-width: 440px;
      margin: 0 auto;
      text-align: center;
    }
    .empty-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }
    .empty-icon svg { width: 56px; height: 56px; stroke-width: 1.25; }
    .empty h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .empty p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .empty-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .empty-actions .link {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .empty-actions .link:hover { color: var(--accent); }

    /* ==========================================================
       FUND DETAIL
       ========================================================== */
    .detail-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .detail-head h2 {
      font-size: 18px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-hero {
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .detail-amount {
      font-size: clamp(36px, 7vw, 56px);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }
    .detail-sub {
      color: var(--text-secondary);
      font-size: 14px;
      margin: 6px 0 20px;
    }
    .detail-progress { height: 4px; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      margin-top: 18px;
    }
    .status-pill svg { width: 16px; height: 16px; stroke-width: 1.75; }
    .status-pill.onTrack { background: var(--success-subtle); color: var(--success); }
    .status-pill.behind { background: var(--warning-subtle); color: var(--warning); }
    .status-pill.completed { background: var(--success-subtle); color: var(--success); }
    .status-pill.overdue { background: var(--danger-subtle); color: var(--danger); }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      margin-bottom: 24px;
    }
    @media (min-width: 768px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-cell {
      padding: 16px 18px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

  <script>
  /* ==============================================================
     SINKING FUND TRACKER
     Clean · Minimal · Multi-currency · Light first · Inter only
     ============================================================== */
  (function() {
    'use strict';

    // === Constants ===
    const STORAGE_KEY = 'sft_data_v1';
    const INSTALL_DISMISS_KEY = 'sft_install_dismissed';
    const APP_VERSION = '1.0.0';

    /**
     * Single source of truth for currency definitions.
     * 15 internationally common currencies. PKR intentionally excluded.
     */
    const CURRENCIES = [
      { code: 'USD', symbol: '$',   name: 'US Dollar',          position: 'prefix', decimals: 2 },
      { code: 'EUR', symbol: '€',   name: 'Euro',               position: 'prefix', decimals: 2 },
      { code: 'GBP', symbol: '£',   name: 'British Pound',      position: 'prefix', decimals: 2 },
      { code: 'CAD', symbol: 'C$',  name: 'Canadian Dollar',    position: 'prefix', decimals: 2 },
      { code: 'AUD', symbol: 'A$',  name: 'Australian Dollar',  position: 'prefix', decimals: 2 },
      { code: 'NZD', symbol: 'NZ$', name: 'New Zealand Dollar', position: 'prefix', decimals: 2 },
      { code: 'JPY', symbol: '¥',   name: 'Japanese Yen',       position: 'prefix', decimals: 0 },
      { code: 'CHF', symbol: 'CHF', name: 'Swiss Franc',        position: 'prefix', decimals: 2 },
      { code: 'SEK', symbol: 'kr',  name: 'Swedish Krona',      position: 'suffix', decimals: 2 },
      { code: 'NOK', symbol: 'kr',  name: 'Norwegian Krone',    position: 'suffix', decimals: 2 },
      { code: 'DKK', symbol: 'kr',  name: 'Danish Krone',       position: 'suffix', decimals: 2 },
      { code: 'SGD', symbol: 'S$',  name: 'Singapore Dollar',   position: 'prefix', decimals: 2 },
      { code: 'HKD', symbol: 'HK$', name: 'Hong Kong Dollar',   position: 'prefix', decimals: 2 },
      { code: 'AED', symbol: 'د.إ', name: 'UAE Dirham',         position: 'prefix', decimals: 2 },
      { code: 'INR', symbol: '₹',   name: 'Indian Rupee',       position: 'prefix', decimals: 2 }
    ];

    const CATEGORIES = [
      { id: 'Travel',     icon: 'plane' },
      { id: 'Emergency',  icon: 'shield' },
      { id: 'Gifts',      icon: 'gift' },
      { id: 'Vehicle',    icon: 'car' },
      { id: 'Education',  icon: 'graduation-cap' },
      { id: 'Home',       icon: 'home' },
      { id: 'Health',     icon: 'heart-pulse' },
      { id: 'Wedding',    icon: 'heart' },
      { id: 'Technology', icon: 'laptop' },
      { id: 'Other',      icon: 'wallet' }
    ];

    const ICON_CHOICES = [
      'plane','shield','gift','car','graduation-cap','home','heart-pulse','heart',
      'laptop','wallet','briefcase','sprout','book','baby','dog','camera'
    ];

    const COLOR_SWATCHES = [
      '#0F766E','#0E7490','#4338CA','#7C3AED',
      '#BE185D','#B45309','#15803D','#475569'
    ];

    // === Utils ===
    const U = {
      uuid() {
        if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      },
      todayISO() { return new Date().toISOString().slice(0, 10); },
      parseDate(s) { return s ? new Date(s + 'T00:00:00') : null; },
      daysBetween(a, b) { return Math.round((b.getTime() - a.getTime()) / 86400000); },

      /**
       * Look up a currency definition by code. Falls back to USD if not found.
       */
      currency(code) {
        return CURRENCIES.find(x => x.code === code) || CURRENCIES[0];
      },

      /**
       * Format an amount in the given currency. Uses Intl.NumberFormat.
       * - JPY: always 0 decimals
       * - Others: up to 2 decimals, but show 0 decimals for whole numbers
       * Single-character symbols ($,€,£,¥,₹) attach tightly; multi-char get a space.
       */
      formatMoney(amount, currencyCode) {
        const c = U.currency(currencyCode || State.defaultCurrency());
        const abs = Math.abs(amount);
        const isInt = Math.abs(abs - Math.round(abs)) < 0.005;
        const minDec = c.decimals === 0 ? 0 : (isInt ? 0 : c.decimals);
        const maxDec = c.decimals;
        const formatted = new Intl.NumberFormat('en-US', {
          minimumFractionDigits: minDec,
          maximumFractionDigits: maxDec
        }).format(abs);
        const sign = amount < 0 ? '-' : '';
        const tight = /^[\$€£¥₹]$/.test(c.symbol);
        if (c.position === 'prefix') {
          return sign + (tight ? c.symbol + formatted : c.symbol + ' ' + formatted);
        }
        return sign + formatted + ' ' + c.symbol;
      },

      /**
       * Compact money formatter for chart axes (1.2k, 3.4M).
       */
      formatMoneyShort(amount, currencyCode) {
        const c = U.currency(currencyCode || State.defaultCurrency());
        const abs = Math.abs(amount);
        let formatted;
        if (abs >= 1_000_000) formatted = (abs / 1_000_000).toFixed(1) + 'M';
        else if (abs >= 10_000) formatted = (abs / 1_000).toFixed(0) + 'k';
        else formatted = Math.round(abs).toLocaleString('en-US');
        const sign = amount < 0 ? '-' : '';
        const tight = /^[\$€£¥₹]$/.test(c.symbol);
        if (c.position === 'prefix') {
          return sign + (tight ? c.symbol + formatted : c.symbol + ' ' + formatted);
        }
        return sign + formatted + ' ' + c.symbol;
      },

      formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso + (iso.includes('T') ? '' : 'T00:00:00'));
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      },
      formatDateShort(iso) {
        if (!iso) return '';
        const d = new Date(iso + (iso.includes('T') ? '' : 'T00:00:00'));
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
      },
      formatRelative(iso) {
        if (!iso) return '';
        const d = new Date(iso + (iso.includes('T') ? '' : 'T00:00:00'));
        const now = new Date(); now.setHours(0,0,0,0);
        const target = new Date(d); target.setHours(0,0,0,0);
        const diff = Math.round((now - target) / 86400000);
        if (diff === 0) return 'Today';
        if (diff === 1) return 'Yesterday';
        if (diff > 1 && diff < 7) return diff + 'd ago';
        return U.formatDateShort(iso);
      },
      escape(s) {
        if (s == null) return '';
        return String(s).replace(/[&<>"']/g, m => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[m]));
      },
      clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); },
      hexToRgba(hex, a) {
        const h = hex.replace('#','');
        const full = h.length === 3 ? h.split('').map(x => x+x).join('') : h;
        const n = parseInt(full, 16);
        return `rgba(${(n>>16)&255}, ${(n>>8)&255}, ${n&255}, ${a})`;
      },
      categoryIcon(name) {
        const c = CATEGORIES.find(x => x.id === name);
        return c ? c.icon : 'wallet';
      },
      renderIcons() { if (window.lucide) window.lucide.createIcons(); }
    };

    // === Store ===
    const Store = {
      _defaults() {
        return {
          version: 1,
          settings: {
            currency: 'USD',
            theme: 'light',
            weekStart: 'monday',
            firstUseDate: new Date().toISOString()
          },
          funds: [],
          contributions: []
        };
      },
      load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return Store._defaults();
          const data = JSON.parse(raw);
          const def = Store._defaults();
          const merged = {
            version: data.version || 1,
            settings: Object.assign(def.settings, data.settings || {}),
            funds: Array.isArray(data.funds) ? data.funds : [],
            contributions: Array.isArray(data.contributions) ? data.contributions : []
          };
          // Defensive: ensure each fund has a currency
          merged.funds.forEach(f => { if (!f.currency) f.currency = merged.settings.currency || 'USD'; });
          return merged;
        } catch (e) {
          console.warn('Store.load: defaults', e);
          return Store._defaults();
        }
      },
      save(data) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        catch (e) { Toast.show('Could not save', 'error'); console.error(e); }
      },
      export() {
        const data = Store.load();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sinking-funds-backup-${U.todayISO()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      },
      import(file) {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = e => {
            try {
              const d = JSON.parse(e.target.result);
              if (!d.version || !Array.isArray(d.funds) || !Array.isArray(d.contributions)) throw new Error('bad file');
              // Ensure currencies present
              d.funds.forEach(f => { if (!f.currency) f.currency = d.settings?.currency || 'USD'; });
              Store.save(d);
              resolve(d);
            } catch (err) { reject(err); }
          };
          r.onerror = () => reject(new Error('read failed'));
          r.readAsText(file);
        });
      },
      reset() { localStorage.removeItem(STORAGE_KEY); },

      /**
       * Apply a new default currency app-wide AND rewrite every fund's currency
       * to match. This is intentional per spec.
       */
      changeDefaultCurrency(code) {
        if (!CURRENCIES.find(c => c.code === code)) return false;
        State.data.settings.currency = code;
        State.data.funds.forEach(f => { f.currency = code; });
        Store.save(State.data);
        return true;
      },

      /**
       * Load the 5 demo funds with realistic contribution history.
       * Always uses the *current* default currency for the funds.
       */
      loadDemo() {
        const cur = State.defaultCurrency();
        const today = new Date();
        const iso = (d) => d.toISOString().slice(0, 10);
        const ago = (n) => { const d = new Date(today); d.setMonth(d.getMonth() - n); return iso(d); };
        const ahead = (n) => { const d = new Date(today); d.setMonth(d.getMonth() + n); return iso(d); };

        const funds = [
          { id: U.uuid(), name: 'Emergency Fund',   icon: 'shield', color: '#0F766E', category: 'Emergency',  currency: cur,
            targetAmount: 5000, targetDate: ahead(12), startDate: ago(6),  frequency: 'monthly',
            notes: '3 months of expenses', archived: false, createdAt: new Date().toISOString() },
          { id: U.uuid(), name: 'Holiday Gifts',    icon: 'gift',   color: '#BE185D', category: 'Gifts',      currency: cur,
            targetAmount: 800,  targetDate: ahead(3),  startDate: ago(4),  frequency: 'monthly',
            notes: 'For family & close friends', archived: false, createdAt: new Date().toISOString() },
          { id: U.uuid(), name: 'Family Vacation',  icon: 'plane',  color: '#0E7490', category: 'Travel',     currency: cur,
            targetAmount: 3500, targetDate: ahead(8),  startDate: ago(2),  frequency: 'monthly',
            notes: 'Coastal trip', archived: false, createdAt: new Date().toISOString() },
          { id: U.uuid(), name: 'New Laptop',       icon: 'laptop', color: '#4338CA', category: 'Technology', currency: cur,
            targetAmount: 2200, targetDate: ahead(6),  startDate: ago(8),  frequency: 'biweekly',
            notes: 'For freelance work', archived: false, createdAt: new Date().toISOString() },
          { id: U.uuid(), name: 'Car Insurance',    icon: 'car',    color: '#B45309', category: 'Vehicle',    currency: cur,
            targetAmount: 900,  targetDate: ahead(4),  startDate: ago(8),  frequency: 'monthly',
            notes: 'Annual renewal', archived: false, createdAt: new Date().toISOString() }
        ];

        const contribs = [];
        const distribute = (fundId, totalAmount, monthsBack, count, includeWithdrawal) => {
          const per = totalAmount / count;
          for (let i = 0; i < count; i++) {
            const back = monthsBack - Math.floor((i / count) * monthsBack);
            const d = new Date(today);
            d.setMonth(d.getMonth() - back);
            d.setDate(5 + (i % 20));
            const variance = 0.85 + Math.random() * 0.3;
            contribs.push({
              id: U.uuid(), fundId,
              amount: Math.round(per * variance * 100) / 100,
              date: iso(d),
              type: 'deposit', note: ''
            });
          }
          if (includeWithdrawal && contribs.length) {
            const d = new Date(today); d.setMonth(d.getMonth() - 1); d.setDate(15);
            contribs.push({
              id: U.uuid(), fundId,
              amount: Math.round(per * 0.3 * 100) / 100,
              date: iso(d),
              type: 'withdrawal', note: 'Unexpected expense'
            });
          }
        };

        distribute(funds[0].id, 1750, 6, 6, false);
        distribute(funds[1].id, 480,  4, 4, false);
        distribute(funds[2].id, 700,  2, 3, false);
        distribute(funds[3].id, 1650, 8, 14, true);
        distribute(funds[4].id, 810,  8, 8, false);

        State.data.funds = funds;
        State.data.contributions = contribs;
        Store.save(State.data);
      }
    };

    // === State ===
    const State = {
      data: null,
      view: 'home',
      currentFundId: null,
      filter: 'all',
      search: '',
      load() { State.data = Store.load(); return State.data; },
      persist() { Store.save(State.data); },
      defaultCurrency() { return State.data?.settings?.currency || 'USD'; },
      fundCurrency(fundId) {
        const f = State.getFund(fundId);
        return f?.currency || State.defaultCurrency();
      },
      getFund(id) { return State.data.funds.find(f => f.id === id); },
      contributionsFor(id) {
        return State.data.contributions
          .filter(c => c.fundId === id)
          .sort((a, b) => a.date.localeCompare(b.date));
      },
      balance(id) {
        return State.contributionsFor(id).reduce(
          (s, c) => s + (c.type === 'withdrawal' ? -c.amount : c.amount),
          0
        );
      },
      /** Distinct currency codes among active funds. */
      activeCurrencies() {
        const set = new Set();
        State.data.funds.filter(f => !f.archived).forEach(f => set.add(f.currency || State.defaultCurrency()));
        return Array.from(set);
      }
    };

    // === Calculations ===
    const Calc = {
      periods(freq, startDate, endDate) {
        const days = (endDate.getTime() - startDate.getTime()) / 86400000;
        if (freq === 'weekly') return days / 7;
        if (freq === 'biweekly') return days / 14;
        return days / 30.4375;
      },
      periodLabel(freq) {
        return freq === 'weekly' ? 'week' : freq === 'biweekly' ? 'fortnight' : 'month';
      },
      analyze(fund) {
        const today = new Date(); today.setHours(0,0,0,0);
        const start = U.parseDate(fund.startDate) || today;
        const end = U.parseDate(fund.targetDate);
        const balance = State.balance(fund.id);
        const target = Math.max(0, Number(fund.targetAmount) || 0);
        const remaining = Math.max(0, target - balance);
        const daysLeft = end ? U.daysBetween(today, end) : 0;
        const totalPeriods = end ? Math.max(0.01, Calc.periods(fund.frequency, start, end)) : 0;
        const periodsLeft = end ? Math.max(0, Calc.periods(fund.frequency, today, end)) : 0;
        const periodsElapsed = Math.max(0, totalPeriods - periodsLeft);
        const expectedByNow = totalPeriods > 0 ? (target / totalPeriods) * periodsElapsed : 0;
        const requiredPerPeriod = periodsLeft > 0.001 ? remaining / Math.max(1, periodsLeft) : remaining;
        const pct = target > 0 ? U.clamp((balance / target) * 100, 0, 100) : 0;
        const deficit = Math.max(0, expectedByNow - balance);

        let status;
        if (balance >= target && target > 0) status = 'completed';
        else if (end && today > end) status = 'overdue';
        else if (balance >= expectedByNow - 0.01) status = 'onTrack';
        else status = 'behind';

        return { balance, target, remaining, daysLeft, totalPeriods, periodsLeft, periodsElapsed,
                 expectedByNow, requiredPerPeriod, pct, status, deficit };
      }
    };

    // === Toast ===
    const Toast = {
      show(message, type) {
        const wrap = document.getElementById('toastWrap');
        const el = document.createElement('div');
        el.className = 'toast ' + (type || '');
        const icon = type === 'success' ? 'check' : type === 'error' ? 'x' : 'info';
        el.innerHTML = `<i data-lucide="${icon}"></i><span>${U.escape(message)}</span>`;
        wrap.appendChild(el);
        U.renderIcons();
        setTimeout(() => el.remove(), 2700);
      }
    };

    // === Renderers ===
    const Render = {
      /** Render dynamic header action area (mobile + desktop). */
      header() {
        const hasFunds = State.data.funds.length > 0;
        const themeIcon = (State.data.settings.theme === 'dark') ? 'sun' : 'moon';
        const install = (window.__sftDeferredPrompt && !localStorage.getItem(INSTALL_DISMISS_KEY))
          ? `<button class="install-pill" data-action="install"><i data-lucide="download"></i>Install</button>` : '';
        const demo = !hasFunds
          ? `<button class="demo-pill" data-action="load-demo">Load demo data</button>` : '';
        const html = `
          ${demo}
          ${install}
          <button class="icon-btn" data-action="toggle-theme" aria-label="Toggle theme"><i data-lucide="${themeIcon}"></i></button>
          <button class="icon-btn" data-view-link="settings" aria-label="Settings"><i data-lucide="settings"></i></button>
        `;
        document.getElementById('headerActions').innerHTML = html;
        document.getElementById('headerActionsDesktop').innerHTML = html;
        U.renderIcons();
      },

      home() {
        const wrap = document.getElementById('view-home');
        const allFunds = State.data.funds;
        const active = allFunds.filter(f => !f.archived);

        if (allFunds.length === 0) {
          wrap.innerHTML = Render._empty();
          U.renderIcons();
          return;
        }

        const analyses = active.map(f => ({ fund: f, a: Calc.analyze(f) }));
        const defaultCur = State.defaultCurrency();

        // Group totals by currency
        const byCur = {};
        analyses.forEach(x => {
          const code = x.fund.currency || defaultCur;
          if (!byCur[code]) byCur[code] = { saved: 0, target: 0 };
          byCur[code].saved += x.a.balance;
          byCur[code].target += x.a.target;
        });
        const currencies = Object.keys(byCur);

        // Pick the dominant currency (highest saved) for the headline; default to settings.currency
        let dominant = defaultCur;
        if (currencies.length > 0) {
          dominant = currencies.includes(defaultCur)
            ? defaultCur
            : currencies.sort((a, b) => byCur[b].saved - byCur[a].saved)[0];
        }
        const dom = byCur[dominant] || { saved: 0, target: 0 };
        const otherCurrencies = currencies.filter(c => c !== dominant);
        const overallPct = dom.target > 0 ? U.clamp((dom.saved / dom.target) * 100, 0, 100) : 0;

        const onTrack = analyses.filter(x => x.a.status === 'onTrack').length;
        const behind = analyses.filter(x => x.a.status === 'behind' || x.a.status === 'overdue').length;
        const completed = analyses.filter(x => x.a.status === 'completed').length;

        const mixedNote = otherCurrencies.length > 0
          ? `<div class="hero-mixed-note">+ ${otherCurrencies.map(c => U.formatMoney(byCur[c].saved, c)).join(' · ')} in other currencies</div>`
          : '';

        wrap.innerHTML = `
          <div class="card hero">
            <div class="hero-label">Total saved</div>
            <div class="hero-amount tabular">${U.formatMoney(dom.saved, dominant)}</div>
            <div class="hero-subline">of ${U.formatMoney(dom.target, dominant)} target</div>
            ${mixedNote}
            <div class="hero-progress progress"><div class="progress-fill" style="width:${overallPct}%"></div></div>
            <div class="hero-stats">
              <span><span class="v">${onTrack}</span> on track</span>
              <span class="sep">·</span>
              <span><span class="v">${behind}</span> behind</span>
              <span class="sep">·</span>
              <span><span class="v">${completed}</span> completed</span>
            </div>
          </div>

          <div class="action-row">
            <button class="btn btn-primary" data-action="add-fund"><i data-lucide="plus"></i> New fund</button>
            <button class="btn btn-secondary" data-action="quick-deposit"><i data-lucide="wallet"></i> Quick deposit</button>
          </div>

          <div class="tabs" role="tablist">
            ${['all','onTrack','behind','completed','archived'].map(f => `
              <button class="tab ${State.filter === f ? 'active' : ''}" data-filter="${f}" role="tab">${({all:'All',onTrack:'On track',behind:'Behind',completed:'Completed',archived:'Archived'})[f]}</button>
            `).join('')}
          </div>

          <div class="search-row">
            <i data-lucide="search"></i>
            <input id="searchInput" class="search-input" type="search" placeholder="Search funds" value="${U.escape(State.search)}" aria-label="Search funds" />
          </div>

          <div class="fund-grid" id="fundGrid">${Render._fundCards(analyses)}</div>
        `;
        U.renderIcons();
      },

      _fundCards(analyses) {
        const list = Render._filterSearch(analyses);
        if (list.length === 0) {
          return `<p style="grid-column:1/-1;color:var(--text-secondary);text-align:center;padding:40px 20px;font-size:14px;">No funds match.</p>`;
        }
        return list.map(x => Render._fundCard(x.fund, x.a)).join('');
      },

      _filterSearch(analyses) {
        let list = analyses.slice();
        const q = State.search.trim().toLowerCase();
        if (q) {
          list = list.filter(x =>
            x.fund.name.toLowerCase().includes(q) ||
            (x.fund.category || '').toLowerCase().includes(q)
          );
        }
        if (State.filter === 'all') return list;
        if (State.filter === 'archived') {
          let arch = State.data.funds.filter(f => f.archived).map(f => ({ fund: f, a: Calc.analyze(f) }));
          if (q) arch = arch.filter(x => x.fund.name.toLowerCase().includes(q) || (x.fund.category || '').toLowerCase().includes(q));
          return arch;
        }
        if (State.filter === 'onTrack') return list.filter(x => x.a.status === 'onTrack');
        if (State.filter === 'behind') return list.filter(x => x.a.status === 'behind' || x.a.status === 'overdue');
        if (State.filter === 'completed') return list.filter(x => x.a.status === 'completed');
        return list;
      },

      _fundCard(fund, a) {
        const color = fund.color || '#0F766E';
        const cur = fund.currency || State.defaultCurrency();
        const iconBg = U.hexToRgba(color, 0.10);
        const lbl = Calc.periodLabel(fund.frequency);
        const fillClass = a.status === 'behind' ? 'warning' : a.status === 'overdue' ? 'danger' : a.status === 'completed' ? 'success' : '';
        const daysLine = a.status === 'completed'
          ? 'Goal reached'
          : a.daysLeft < 0
            ? `${Math.abs(a.daysLeft)} days overdue`
            : `${a.daysLeft} days left`;
        const neededLine = a.status === 'completed'
          ? '—'
          : `${U.formatMoneyShort(a.requiredPerPeriod, cur)} / ${lbl}`;
        return `
          <button class="fund-card" data-fund-id="${fund.id}">
            <div class="fund-card-top">
              <span class="fund-icon" style="background:${iconBg};color:${color};">
                <i data-lucide="${U.escape(fund.icon || U.categoryIcon(fund.category))}"></i>
              </span>
              <span class="fund-status-dot ${a.status}" aria-hidden="true"></span>
            </div>
            <div>
              <div class="fund-name">${U.escape(fund.name)}</div>
              <div class="fund-category">${U.escape(fund.category || 'Other')}</div>
            </div>
            <div class="fund-amounts">
              <span class="fund-saved tabular">${U.formatMoney(a.balance, cur)}</span>
              <span class="fund-target tabular">/ ${U.formatMoney(a.target, cur)}</span>
            </div>
            <div class="progress"><div class="progress-fill ${fillClass}" style="width:${a.pct}%"></div></div>
            <div class="fund-footer">
              <span>${daysLine}</span>
              <span class="needed tabular">${neededLine}</span>
            </div>
          </button>
        `;
      },

      _empty() {
        return `
          <div class="empty">
            <div class="empty-icon"><i data-lucide="piggy-bank"></i></div>
            <h2>Start saving with purpose</h2>
            <p>Create a fund for any goal — vacations, emergencies, gifts, big purchases.</p>
            <div class="empty-actions">
              <button class="btn btn-primary" data-action="add-fund"><i data-lucide="plus"></i> Create your first fund</button>
              <a href="#" class="link" data-action="load-demo">or load demo data to explore</a>
            </div>
          </div>
        `;
      },

      detail() {
        const wrap = document.getElementById('view-detail');
        const fund = State.getFund(State.currentFundId);
        if (!fund) {
          wrap.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:48px;">Fund not found.</p>';
          return;
        }
        const a = Calc.analyze(fund);
        const lbl = Calc.periodLabel(fund.frequency);
        const cur = fund.currency || State.defaultCurrency();
        const fillClass = a.status === 'behind' ? 'warning' : a.status === 'overdue' ? 'danger' : a.status === 'completed' ? 'success' : '';

        let pillHtml = '';
        if (a.status === 'completed') {
          pillHtml = `<div class="status-pill completed"><i data-lucide="check-circle-2"></i>Goal reached.</div>`;
        } else if (a.status === 'overdue') {

        const contribs = State.contributionsFor(fund.id).slice().reverse();
        const activity = contribs.length
          ? contribs.map(c => `

                <span class="activity-amount ${c.type} tabular">
                  <i data-lucide="${c.type === 'withdrawal' ? 'arrow-down-left' : 'arrow-up-right'}"></i>
                  ${U.formatMoney(c.amount, cur)}

                  <i data-lucide="trash-2"></i>

          : `<p style="color:var(--text-secondary);text-align:center;padding:24px;font-size:14px;">No contributions yet.</p>`;

        wrap.innerHTML = `
          <div class="detail-head">
            <button class="icon-btn" data-action="back-home" aria-label="Back"><i data-lucide="chevron-left"></i></button>
            <h2>${U.escape(fund.name)}</h2>
            <button class="icon-btn" data-action="fund-menu" data-fund-id="${fund.id}" aria-label="Options"><i data-lucide="more-horizontal"></i></button>
          </div>

          <div class="card detail-hero">
            <div class="detail-amount tabular">${U.formatMoney(a.balance, cur)}</div>
            <div class="detail-sub">of ${U.formatMoney(a.target, cur)} · ${Math.round(a.pct)}% complete</div>
            <div class="detail-progress progress"><div class="progress-fill ${fillClass}" style="width:${a.pct}%"></div></div>
            ${pillHtml}
          </div>

          <div class="stat-grid">
            <div class="stat-cell"><div class="stat-label">Saved</div><div class="stat-value tabular">${U.formatMoney(a.balance, cur)}</div></div>
            <div class="stat-cell"><div class="stat-label">Remaining</div><div class="stat-value tabular">${U.formatMoney(a.remaining, cur)}</div></div>
            <div class="stat-cell"><div class="stat-label">${lbl[0].toUpperCase() + lbl.slice(1)}ly needed</div><div class="stat-value tabular">${U.formatMoney(a.requiredPerPeriod, cur)}</div></div>
            <div class="stat-cell"><div class="stat-label">Days left</div><div class="stat-value tabular">${Math.max(0, a.daysLeft)}</div></div>
          </div>

          <button class="btn btn-primary btn-block" data-action="add-contribution" data-fund-id="${fund.id}">

        const defaultCur = State.defaultCurrency();
        // For aggregates: only count funds whose currency matches the default
        const inDefault = active.filter(f => (f.currency || defaultCur) === defaultCur);
        const otherCurCount = active.length - inDefault.length;

        const totalSaved = inDefault.reduce((s, f) => s + State.balance(f.id), 0);
        const now = new Date();
        const lastMonth = new Date(now); lastMonth.setMonth(now.getMonth() - 1);
        const lastMonthKey = lastMonth.toISOString().slice(0, 7);
        const thisMonthKey = now.toISOString().slice(0, 7);
        const inDefaultIds = new Set(inDefault.map(f => f.id));
        let thisMonthSum = 0, lastMonthSum = 0;
        State.data.contributions.forEach(c => {
          if (!inDefaultIds.has(c.fundId)) return;
          const k = c.date.slice(0, 7);
          const v = c.type === 'withdrawal' ? -c.amount : c.amount;
          if (k === thisMonthKey) thisMonthSum += v;
          else if (k === lastMonthKey) lastMonthSum += v;
        });
        const monthlyDelta = thisMonthSum - lastMonthSum;

        const totalsByMonth = {};
        State.data.contributions.forEach(c => {
          if (!inDefaultIds.has(c.fundId)) return;

          totalsByMonth[k] = (totalsByMonth[k] || 0) + (c.type === 'withdrawal' ? -c.amount : c.amount);
        });
        const allMonths = Object.keys(totalsByMonth);
        const avgMonthly = allMonths.length ? Object.values(totalsByMonth).reduce((s, v) => s + v, 0) / allMonths.length : 0;

        const upcoming = active.slice()

              <div class="kpi-delta">across ${defaultCur} funds</div>
            </div>
          </div>

          <div class="insights-grid">
            <div class="card chart-card">
              <h3>Total savings over time</h3>
              <div class="chart-sub">Cumulative balance (${defaultCur})</div>
              <div class="chart-wrap"><canvas id="chartTotal"></canvas></div>
            </div>
            <div class="card chart-card">
              <h3>Allocation by category</h3>
              <div class="chart-sub">Share of current savings (${defaultCur})</div>
              <div class="chart-wrap"><canvas id="chartAlloc"></canvas></div>
            </div>
            <div class="card chart-card">
              <h3>Monthly contributions</h3>
              <div class="chart-sub">Net deposits, last 12 months</div>
              <div class="chart-wrap"><canvas id="chartMonthly"></canvas></div>
            </div>
            <div class="card chart-card">
              <h3>Upcoming deadlines</h3>
              <div class="chart-sub">Next 5 funds by target date</div>
              <div class="upcoming-list">
                ${upcoming.length ? upcoming.map(f => {
                  const a = Calc.analyze(f);
                  return `
                    <div class="upcoming-row">
                      <span class="fund-icon" style="width:32px;height:32px;border-radius:8px;background:${U.hexToRgba(f.color || '#0F766E', 0.10)};color:${f.color || '#0F766E'};">

        Charts.insights(inDefault, defaultCur);

    // === Modals ===
    const Modal = {
      _stack: [],
      open(html, opts = {}) {
        const root = document.getElementById('modalRoot');
        const backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop';
        backdrop.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${html}</div>`;
        root.appendChild(backdrop);
        requestAnimationFrame(() => backdrop.classList.add('open'));
        backdrop.addEventListener('click', (e) => {
          if (e.target === backdrop) Modal.close();
        });
        Modal._stack.push(backdrop);
        U.renderIcons();
        if (opts.onMount) opts.onMount(backdrop);
        return backdrop;
      },
      close() {
        const el = Modal._stack.pop();
        if (!el) return;
        el.classList.remove('open');
        setTimeout(() => el.remove(), 220);

              </select>

        Modal.open(html, { onMount: (root) => {
          const form = root.querySelector('#fundForm');
          const state = Object.assign({}, data);
          const prefixEl = root.querySelector('#ff-prefix');

          const updatePrefix = () => {
            const c = U.currency(state.currency);
            prefixEl.textContent = c.position === 'prefix' ? c.symbol : c.code;
          };
          const updateHint = () => {
            const today = new Date(); today.setHours(0,0,0,0);
            const end = U.parseDate(state.targetDate);
            const target = Number(state.targetAmount) || 0;
            const balance = isEdit ? State.balance(existing.id) : 0;
            const remaining = Math.max(0, target - balance);
            if (target <= 0 || !end || end <= today) {
              root.querySelector('#calcHint').textContent = 'Set a target amount and future date to see required contributions.';
              return;
            }
            const per = Math.max(0.01, Calc.periods(state.frequency, today, end));
            const need = remaining / per;
            const lbl = Calc.periodLabel(state.frequency);
            root.querySelector('#calcHint').textContent = `You'll save ${U.formatMoney(need, state.currency)} every ${lbl} to reach this goal.`;
          };

          updateHint();

            updateHint();

          form.addEventListener('change', (e) => {

          form.addEventListener('submit', (ev) => {

            const fd = new FormData(form);
            const fund = {
              id: existing?.id || U.uuid(),
              name: (fd.get('name') || '').toString().trim(),
