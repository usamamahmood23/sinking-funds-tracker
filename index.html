      quickDeposit() {
        const defaultCur = State.defaultCurrency();
        const active = State.data.funds.filter(f => !f.archived);
        const eligible = active.filter(f => (f.currency || defaultCur) === defaultCur);
        const skipped = active.length - eligible.length;
        if (eligible.length === 0) {
          Toast.show(`No funds in ${defaultCur} to distribute to`, 'error');
          return;
        }
        const analyses = eligible.map(f => ({ fund: f, a: Calc.analyze(f) }));
        const c = U.currency(defaultCur);
        const warning = skipped > 0
          ? `<div class="qd-warning"><i data-lucide="info" style="width:14px;height:14px;display:inline;vertical-align:-2px;"></i> ${skipped} fund${skipped !== 1 ? 's' : ''} in other currencies hidden. Quick deposit only works on funds matching your default currency (${defaultCur}).</div>`
          : '';
        const html = `
          <div class="modal-header">
            <h3>Distribute payday savings</h3>
            <button class="icon-btn" data-action="close-modal" aria-label="Close"><i data-lucide="x"></i></button>
          </div>
          ${warning}
          <div class="field">
            <label class="label" for="qd-total">Total to distribute (${defaultCur})</label>
            <div style="display:flex;gap:8px;">
              <div class="input-with-prefix large" style="flex:1;">
                <span class="prefix">${c.position === 'prefix' ? c.symbol : c.code}</span>
                <input class="input large tabular" id="qd-total" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0" />
              </div>
              <button type="button" class="btn btn-secondary" id="qd-auto">Auto-distribute</button>
            </div>
          </div>

          <div id="qdList">
            ${analyses.map(x => `
              <div class="qd-row" data-fund-id="${x.fund.id}">
                <span class="fund-icon" style="width:36px;height:36px;border-radius:8px;background:${U.hexToRgba(x.fund.color || '#0F766E', 0.10)};color:${x.fund.color || '#0F766E'};">
                  <i data-lucide="${U.escape(x.fund.icon || U.categoryIcon(x.fund.category))}"></i>
                </span>
                <div class="qd-info">
                  <div class="qd-name">${U.escape(x.fund.name)}</div>
                  <div class="qd-cat tabular">${U.escape(x.fund.category)} · needs ${U.formatMoneyShort(x.a.requiredPerPeriod, x.fund.currency)}/${Calc.periodLabel(x.fund.frequency)}</div>
                </div>
                <input class="qd-amount tabular" data-need="${x.a.requiredPerPeriod}" type="number" inputmode="decimal" min="0" step="0.01" value="0" aria-label="Amount for ${U.escape(x.fund.name)}" />
              </div>
            `).join('')}
          </div>

          <div class="qd-summary" id="qdSummary">
            <span>Allocated</span>
            <span class="v tabular" id="qdSumText">${U.formatMoney(0, defaultCur)} of ${U.formatMoney(0, defaultCur)}</span>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="qdApply">Apply</button>
          </div>
        `;
        Modal.open(html, { onMount: (root) => {
          const totalInput = root.querySelector('#qd-total');
          const inputs = root.querySelectorAll('.qd-amount');
          const summary = root.querySelector('#qdSummary');
          const sumText = root.querySelector('#qdSumText');
          const totalNeed = analyses.reduce((s, x) => s + Math.max(0.01, x.a.requiredPerPeriod), 0);

          const update = () => {
            let alloc = 0;
            inputs.forEach(i => alloc += Number(i.value) || 0);
            const total = Number(totalInput.value) || 0;
            sumText.textContent = `${U.formatMoney(alloc, defaultCur)} of ${U.formatMoney(total, defaultCur)}`;
            summary.classList.remove('over', 'exact');
            if (Math.abs(total - alloc) < 0.01 && total > 0) summary.classList.add('exact');
            else if (alloc > total) summary.classList.add('over');
          };

          root.querySelector('#qd-auto').addEventListener('click', () => {
            const total = Number(totalInput.value) || 0;
            inputs.forEach(i => {
              const need = Number(i.dataset.need) || 0;
              const share = totalNeed > 0 ? (need / totalNeed) * total : total / inputs.length;
              i.value = share > 0 ? share.toFixed(2) : 0;
            });
            update();
          });
          totalInput.addEventListener('input', update);
          inputs.forEach(i => i.addEventListener('input', update));

          setTimeout(() => totalInput.focus(), 80);

          root.querySelector('#qdApply').addEventListener('click', () => {
            let count = 0;
            const today = U.todayISO();
            inputs.forEach(i => {
              const fundId = i.closest('[data-fund-id]').dataset.fundId;
              const amount = Number(i.value) || 0;
              if (amount > 0) {
                State.data.contributions.push({
                  id: U.uuid(), fundId, amount, date: today, type: 'deposit', note: 'Quick deposit'
                });
                count++;
              }
            });
            if (count === 0) { Toast.show('Enter at least one amount', 'error'); return; }
            State.persist();
            Modal.close();
            App.rerenderAll();
            Toast.show(`Added to ${count} fund${count !== 1 ? 's' : ''}`, 'success');
          });
        }});
      },

      confirm(title, message, onConfirm, dangerLabel) {
        const html = `
          <div class="modal-header">
            <h3>${U.escape(title)}</h3>
            <button class="icon-btn" data-action="close-modal" aria-label="Close"><i data-lucide="x"></i></button>
          </div>
          <p style="color:var(--text-secondary);font-size:14px;line-height:1.6;">${U.escape(message)}</p>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmYes">${U.escape(dangerLabel || 'Delete')}</button>
          </div>
        `;
        Modal.open(html, { onMount: (root) => {
          root.querySelector('#confirmYes').addEventListener('click', () => { onConfirm(); Modal.close(); });
        }});
      },

      /** Non-destructive primary-action confirm (used by global currency change). */
      confirmPrimary(title, message, onConfirm, label) {
        const html = `
          <div class="modal-header">
            <h3>${U.escape(title)}</h3>
            <button class="icon-btn" data-action="close-modal" aria-label="Close"><i data-lucide="x"></i></button>
          </div>
          <p style="color:var(--text-secondary);font-size:14px;line-height:1.6;">${U.escape(message)}</p>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="confirmYes">${U.escape(label || 'Confirm')}</button>
          </div>
        `;
        Modal.open(html, { onMount: (root) => {
          root.querySelector('#confirmYes').addEventListener('click', () => { onConfirm(); Modal.close(); });
        }});
      }
    };

    // === Charts ===
    const Charts = {
      _loaded: false,
      _instances: {},
      load() {
        if (Charts._loaded || window.Chart) { Charts._loaded = true; return Promise.resolve(); }
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
          s.onload = () => { Charts._loaded = true; resolve(); };
          s.onerror = reject;
          document.head.appendChild(s);
        });
      },
      colors() {
        const body = getComputedStyle(document.body);
        return {
          accent: body.getPropertyValue('--accent').trim() || '#0F766E',
          text: body.getPropertyValue('--text-muted').trim() || '#A8A29E',
          textPrimary: body.getPropertyValue('--text-primary').trim() || '#1C1917',
          grid: body.getPropertyValue('--border').trim() || '#E7E5E4',
          surface: body.getPropertyValue('--surface').trim() || '#FFFFFF'
        };
      },
      baseOpts() {
        const c = Charts.colors();
        return {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 400, easing: 'easeOutQuart' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: c.textPrimary,
              titleColor: c.surface,
              bodyColor: c.surface,
              padding: 10,
              cornerRadius: 8,
              displayColors: false,
              titleFont: { family: 'Inter', size: 12, weight: '500' },
              bodyFont: { family: 'Inter', size: 13, weight: '500' }
            }
          }
        };
      },
      detail(fund, color) {
        if (!window.Chart) { Charts.load().then(() => Charts.detail(fund, color)); return; }
        const ctx = document.getElementById('detailChart');
        if (!ctx) return;
        if (Charts._instances.detail) Charts._instances.detail.destroy();

        const cur = fund.currency || State.defaultCurrency();
        const contribs = State.contributionsFor(fund.id);
        const points = [];
        let running = 0;
        points.push({ x: fund.startDate || U.todayISO(), y: 0 });
        contribs.forEach(c => {
          running += c.type === 'withdrawal' ? -c.amount : c.amount;
          points.push({ x: c.date, y: running });
        });
        points.push({ x: U.todayISO(), y: running });

        const c = Charts.colors();
        const opts = Charts.baseOpts();
        Charts._instances.detail = new Chart(ctx, {
          type: 'line',
          data: {
            labels: points.map(p => p.x),
            datasets: [{
              data: points.map(p => p.y),
              borderColor: color,
              backgroundColor: 'transparent',
              borderWidth: 2,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4,
              pointHoverBackgroundColor: color
            }]
          },
          options: Object.assign({}, opts, {
            plugins: Object.assign({}, opts.plugins, {
              tooltip: Object.assign({}, opts.plugins.tooltip, {
                callbacks: { label: ctx => U.formatMoney(ctx.parsed.y, cur) }
              })
            }),
            scales: {
              x: { ticks: { color: c.text, font: { family: 'Inter', size: 11 }, maxTicksLimit: 5 }, grid: { display: false }, border: { display: false } },
              y: { ticks: { color: c.text, font: { family: 'Inter', size: 11 }, callback: v => U.formatMoneyShort(v, cur) }, grid: { color: c.grid }, border: { display: false } }
            }
          })
        });
      },
      insights(funds, defaultCur) {
        if (!window.Chart) { Charts.load().then(() => Charts.insights(funds, defaultCur)); return; }
        const c = Charts.colors();
        const opts = Charts.baseOpts();
        const cur = defaultCur || State.defaultCurrency();

        const inIds = new Set(funds.map(f => f.id));
        const all = State.data.contributions.filter(c => inIds.has(c.fundId)).slice().sort((a, b) => a.date.localeCompare(b.date));
        let run = 0;
        const map = {};
        all.forEach(ct => {
          run += ct.type === 'withdrawal' ? -ct.amount : ct.amount;
          map[ct.date] = run;
        });
        const dates = Object.keys(map).sort();
        const ctxTotal = document.getElementById('chartTotal');
        if (Charts._instances.total) Charts._instances.total.destroy();
        if (ctxTotal) {
          Charts._instances.total = new Chart(ctxTotal, {
            type: 'line',
            data: {
              labels: dates,
              datasets: [{
                data: dates.map(d => map[d]),
                borderColor: c.accent,
                backgroundColor: 'transparent',
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0,
                pointHoverRadius: 4
              }]
            },
            options: Object.assign({}, opts, {
              plugins: Object.assign({}, opts.plugins, {
                tooltip: Object.assign({}, opts.plugins.tooltip, {
                  callbacks: { label: ctx => U.formatMoney(ctx.parsed.y, cur) }
                })
              }),
              scales: {
                x: { ticks: { color: c.text, font: { family: 'Inter', size: 11 }, maxTicksLimit: 5 }, grid: { display: false }, border: { display: false } },
                y: { ticks: { color: c.text, font: { family: 'Inter', size: 11 }, callback: v => U.formatMoneyShort(v, cur) }, grid: { color: c.grid }, border: { display: false } }
              }
            })
          });
        }

        // Allocation by category — horizontal bar
        const catTotals = {};
        funds.forEach(f => {
          const b = State.balance(f.id);
          if (b > 0) catTotals[f.category] = (catTotals[f.category] || 0) + b;
        });
        const cats = Object.keys(catTotals);
        const totalCats = Object.values(catTotals).reduce((s, v) => s + v, 0) || 1;
        const ctxAlloc = document.getElementById('chartAlloc');
        if (Charts._instances.alloc) Charts._instances.alloc.destroy();
        if (ctxAlloc) {
          Charts._instances.alloc = new Chart(ctxAlloc, {
            type: 'bar',
            data: {
              labels: cats,
              datasets: [{
                data: cats.map(k => catTotals[k]),
                backgroundColor: c.accent,
                borderRadius: 4,
                barThickness: 16
              }]
            },
            options: Object.assign({}, opts, {
              indexAxis: 'y',
              plugins: Object.assign({}, opts.plugins, {
                tooltip: Object.assign({}, opts.plugins.tooltip, {
                  callbacks: {
                    label: ctx => `${U.formatMoney(ctx.parsed.x, cur)} (${Math.round((ctx.parsed.x / totalCats) * 100)}%)`
                  }
                })
              }),
              scales: {
                x: { ticks: { color: c.text, font: { family: 'Inter', size: 11 }, callback: v => U.formatMoneyShort(v, cur) }, grid: { color: c.grid }, border: { display: false } },
                y: { ticks: { color: c.text, font: { family: 'Inter', size: 11 } }, grid: { display: false }, border: { display: false } }
              }
            })
          });
        }

        // Monthly contributions — vertical bar
        const monthly = {};
        const now = new Date();
        for (let i = 11; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          monthly[d.toISOString().slice(0, 7)] = 0;
        }
        State.data.contributions.forEach(ct => {
          if (!inIds.has(ct.fundId)) return;
          const k = ct.date.slice(0, 7);
          if (k in monthly) monthly[k] += ct.type === 'withdrawal' ? -ct.amount : ct.amount;
        });
        const ctxM = document.getElementById('chartMonthly');
        if (Charts._instances.monthly) Charts._instances.monthly.destroy();
        if (ctxM) {
          Charts._instances.monthly = new Chart(ctxM, {
            type: 'bar',
            data: {
              labels: Object.keys(monthly).map(k => {
                const [y, m] = k.split('-');
                return new Date(Number(y), Number(m)-1, 1).toLocaleDateString('en', { month: 'short' });
              }),
              datasets: [{
                data: Object.values(monthly),
                backgroundColor: c.accent,
                borderRadius: 4,
                maxBarThickness: 28
              }]
            },
            options: Object.assign({}, opts, {
              plugins: Object.assign({}, opts.plugins, {
                tooltip: Object.assign({}, opts.plugins.tooltip, {
                  callbacks: { label: ctx => U.formatMoney(ctx.parsed.y, cur) }
                })
              }),
              scales: {
                x: { ticks: { color: c.text, font: { family: 'Inter', size: 11 } }, grid: { display: false }, border: { display: false } },
                y: { ticks: { color: c.text, font: { family: 'Inter', size: 11 }, callback: v => U.formatMoneyShort(v, cur) }, grid: { color: c.grid }, border: { display: false } }
              }
            })
          });
        }
      }
    };

    // === App namespace ===
    const App = {
      showView(name) {
        State.view = name;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const el = document.getElementById('view-' + name);
        if (el) el.classList.add('active');
        document.querySelectorAll('.nav-item[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === name));
        window.scrollTo({ top: 0, behavior: 'instant' });
        App.renderCurrent();
      },
      renderCurrent() {
        Render.header();
        switch (State.view) {
          case 'home': Render.home(); break;
          case 'detail': Render.detail(); break;
          case 'insights': Charts.load().then(() => Render.insights()); break;
          case 'funds': Render.funds(); break;
          case 'settings': Render.settings(); break;
        }
      },
      rerenderAll() { App.renderCurrent(); },
      applyTheme() {
        const setting = State.data.settings.theme;
        let theme = setting;
        if (setting === 'auto') {
          theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.body.dataset.theme = theme;
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#0C0A09' : '#FAFAF9');
      }
    };

    // === Handlers ===
    function bindEvents() {
      // Nav
      document.querySelector('.nav-bar').addEventListener('click', (e) => {
        const item = e.target.closest('.nav-item');
        if (item && item.dataset.view) App.showView(item.dataset.view);
      });
      document.getElementById('fabAdd').addEventListener('click', () => Modal.fundForm(null));

      document.body.addEventListener('click', (e) => {
        if (e.target.closest('[data-action="close-modal"]')) { e.preventDefault(); Modal.close(); return; }
        if (e.target.closest('[data-action="add-fund"]')) { e.preventDefault(); Modal.fundForm(null); return; }
        const ac = e.target.closest('[data-action="add-contribution"]');
        if (ac) { e.preventDefault(); Modal.contribution(ac.dataset.fundId); return; }
        if (e.target.closest('[data-action="quick-deposit"]')) { e.preventDefault(); Modal.quickDeposit(); return; }
        if (e.target.closest('[data-action="back-home"]')) { e.preventDefault(); App.showView('home'); return; }
        const fm = e.target.closest('[data-action="fund-menu"]');
        if (fm) { e.preventDefault(); openFundMenu(fm); return; }

        if (e.target.closest('[data-action="load-demo"]')) {
          e.preventDefault();
          if (State.data.funds.length > 0) {
            Modal.confirm('Load demo data?', 'This adds demo funds and contributions alongside your existing data.', () => {
              Store.loadDemo(); App.rerenderAll(); Toast.show('Demo data loaded', 'success');
            }, 'Load demo');
          } else {
            Store.loadDemo(); App.rerenderAll(); Toast.show('Demo data loaded', 'success');
          }
          return;
        }

        if (e.target.closest('[data-action="toggle-theme"]')) {
          const cur = State.data.settings.theme;
          State.data.settings.theme = cur === 'light' ? 'dark' : cur === 'dark' ? 'auto' : 'light';
          State.persist();
          App.applyTheme();
          App.rerenderAll();
          return;
        }
        if (e.target.closest('[data-action="install"]')) {
          if (window.__sftDeferredPrompt) {
            window.__sftDeferredPrompt.prompt();
            window.__sftDeferredPrompt.userChoice.then(c => {
              if (c.outcome === 'accepted') localStorage.setItem(INSTALL_DISMISS_KEY, '1');
              window.__sftDeferredPrompt = null;
              Render.header();
            });
          }
          return;
        }

        const tab = e.target.closest('[data-filter]');
        if (tab) { State.filter = tab.dataset.filter; Render.home(); return; }

        const vl = e.target.closest('[data-view-link]');
        if (vl) { App.showView(vl.dataset.viewLink); return; }

        const dc = e.target.closest('[data-action="delete-contrib"]');
        if (dc) {
          e.preventDefault(); e.stopPropagation();
          const id = dc.dataset.contribId;
          State.data.contributions = State.data.contributions.filter(c => c.id !== id);
          State.persist();
          Render.detail();
          Toast.show('Removed', 'success');
          return;
        }

        const card = e.target.closest('.fund-card[data-fund-id]');
        if (card) { State.currentFundId = card.dataset.fundId; App.showView('detail'); return; }

        if (e.target.closest('[data-action="export"]')) { Store.export(); Toast.show('Backup exported', 'success'); return; }
        if (e.target.closest('[data-action="import"]')) {
          const inp = document.createElement('input');
          inp.type = 'file'; inp.accept = 'application/json';
          inp.onchange = (ev) => {
            const file = ev.target.files[0]; if (!file) return;
            Modal.confirm('Import backup?', 'This replaces all current data with the contents of the file.', () => {
              Store.import(file).then(d => {
                State.data = d; App.applyTheme(); App.rerenderAll();
                Toast.show('Backup imported', 'success');
              }).catch(() => Toast.show('Could not import file', 'error'));
            }, 'Replace data');
          };
          inp.click();
          return;
        }
        if (e.target.closest('[data-action="reset"]')) {
          Modal.confirm('Reset all data?', 'This permanently deletes all funds, contributions, and settings.', () => {
            Store.reset(); State.load(); App.applyTheme(); App.showView('home');
            Toast.show('All data cleared', 'success');
          }, 'Reset everything');
          return;
        }

        const ts = e.target.closest('[data-theme-set]');
        if (ts) { State.data.settings.theme = ts.dataset.themeSet; State.persist(); App.applyTheme(); Render.settings(); Render.header(); return; }
        const ws = e.target.closest('[data-week-set]');
        if (ws) { State.data.settings.weekStart = ws.dataset.weekSet; State.persist(); Render.settings(); return; }

        // dismiss any open menu
        const openMenu = document.querySelector('.menu');
        if (openMenu && !e.target.closest('.menu') && !e.target.closest('[data-action="fund-menu"]')) {
          openMenu.remove();
        }
      });

      document.body.addEventListener('change', (e) => {
        if (e.target.id === 'currencySelect') {
          const prev = e.target.dataset.current;
          const code = e.target.value;
          if (code === prev) return;
          if (State.data.funds.length > 0) {
            Modal.confirmPrimary(
              `Change currency to ${code}?`,
              `This will update the display currency for every existing fund. Stored amounts stay the same — only the currency label changes.`,
              () => {
                Store.changeDefaultCurrency(code);
                App.rerenderAll();
                Toast.show(`Currency changed to ${code}`, 'success');
              },
              'Change all'
            );
            // revert the select if user cancels by leaving it as-is until confirm fires
            e.target.value = prev;
          } else {
            Store.changeDefaultCurrency(code);
            App.rerenderAll();
            Toast.show(`Currency changed to ${code}`, 'success');
          }
        }
      });

      document.body.addEventListener('input', (e) => {
        if (e.target.id === 'searchInput') {
          State.search = e.target.value;
          const grid = document.getElementById('fundGrid');
          if (grid) {
            const active = State.data.funds.filter(f => !f.archived);
            const analyses = active.map(f => ({ fund: f, a: Calc.analyze(f) }));
            grid.innerHTML = Render._fundCards(analyses);
            U.renderIcons();
          }
        }
      });

      document.addEventListener('keydown', (e) => {
        const inField = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
        if (e.key === 'Escape') {
          if (Modal._stack.length) Modal.close();
          const menu = document.querySelector('.menu'); if (menu) menu.remove();
          return;
        }
        if (inField) return;
        if (e.key === 'n' || e.key === 'N') { e.preventDefault(); Modal.fundForm(null); }
        else if (e.key === '/') { e.preventDefault(); document.getElementById('searchInput')?.focus(); }
        else if (e.key === 't' || e.key === 'T') {
          const cur = State.data.settings.theme;
          State.data.settings.theme = cur === 'light' ? 'dark' : cur === 'dark' ? 'auto' : 'light';
          State.persist(); App.applyTheme(); App.rerenderAll();
        }
      });

      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
          if (State.data.settings.theme === 'auto') App.applyTheme();
        });
      }
    }

    function openFundMenu(triggerBtn) {
      document.querySelectorAll('.menu').forEach(m => m.remove());
      const fundId = triggerBtn.dataset.fundId;
      const fund = State.getFund(fundId);
      if (!fund) return;
      const menu = document.createElement('div');
      menu.className = 'menu';
      menu.innerHTML = `
        <button class="menu-item" data-menu="edit"><i data-lucide="pencil"></i> Edit fund</button>
        <button class="menu-item" data-menu="archive"><i data-lucide="archive"></i> ${fund.archived ? 'Unarchive' : 'Archive'}</button>
        <button class="menu-item danger" data-menu="delete"><i data-lucide="trash-2"></i> Delete fund</button>
      `;
      document.body.appendChild(menu);
      const rect = triggerBtn.getBoundingClientRect();
      const mw = menu.offsetWidth;
      let left = rect.right - mw;
      left = Math.max(8, Math.min(left, window.innerWidth - mw - 8));
      menu.style.top = (rect.bottom + 6 + window.scrollY) + 'px';
      menu.style.left = left + 'px';
      U.renderIcons();

      menu.addEventListener('click', (e) => {
        const item = e.target.closest('[data-menu]'); if (!item) return;
        const action = item.dataset.menu;
        menu.remove();
        if (action === 'edit') Modal.fundForm(fund);
        else if (action === 'archive') {
          fund.archived = !fund.archived;
          State.persist();
          Toast.show(fund.archived ? 'Archived' : 'Restored', 'success');
          App.showView('home');
        } else if (action === 'delete') {
          Modal.confirm('Delete fund?', `"${fund.name}" and its contributions will be permanently removed.`, () => {
            State.data.funds = State.data.funds.filter(f => f.id !== fundId);
            State.data.contributions = State.data.contributions.filter(c => c.fundId !== fundId);
            State.persist();
            Toast.show('Fund deleted', 'success');
            App.showView('home');
          });
        }
      });
    }

    // === PWA ===
    function registerSW() {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW failed', err));
        });
      }
    }
    function setupInstall() {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.__sftDeferredPrompt = e;
        Render.header();
      });
      window.addEventListener('appinstalled', () => {
        localStorage.setItem(INSTALL_DISMISS_KEY, '1');
        window.__sftDeferredPrompt = null;
        Render.header();
        Toast.show('App installed', 'success');
      });
    }

    // === Init ===
    function init() {
      State.load();
      App.applyTheme();
      bindEvents();
      registerSW();
      setupInstall();
      App.showView('home');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    window.App = { rerender: () => App.rerenderAll() };
  })();
  </script>
</body>
</html>
